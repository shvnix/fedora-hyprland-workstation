background {
    path = /usr/local/share/fedora-hyprland-workstation/wallpapers/1324528.jpeg

    blur_passes = 3
    blur_size = 6
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"

    font_size = 72

    position = 0, 80

    halign = center
    valign = center
}

input-field {

    size = 280, 50

    outline_thickness = 2

    dots_size = 0.25

    fade_on_empty = false

    position = 0, -80

    halign = center

    valign = center
}
