##############################################
# Appearance
##############################################

general {

    gaps_in = 4
    gaps_out = 0,8,8,8

    border_size = 2

    resize_on_border = true

    allow_tearing = false

}

decoration {

    rounding = 10

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 10
        passes = 3
        ignore_opacity = true
    }
}

animations {

    enabled = false

}
