##############################################
# Applications
##############################################

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager


##############################################
# Session
##############################################

# Lock Screen
bind = $mainMod, L, exec, pidof hyprlock || hyprlock

# Logout (Return to GDM)
bind = $mainMod SHIFT, L, exit

# Close Current Window
bind = $mainMod SHIFT, Q, killactive

# Reload Hyprland Configuration
bind = $mainMod SHIFT, R, exec, hyprctl reload




##############################################
# Window Focus
##############################################

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

##############################################
# Window Movement
##############################################

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

##############################################
# Fullscreen
##############################################

bind = $mainMod, F, fullscreen

##############################################
# Floating
##############################################

bind = $mainMod, V, togglefloating

##############################################
# Workspaces
##############################################

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

##############################################
# Move Floating Window (10 px)
##############################################

bind = SUPER, left, moveactive, -10 0
bind = SUPER, right, moveactive, 10 0
bind = SUPER, up, moveactive, 0 -10
bind = SUPER, down, moveactive, 0 10

##############################################
# Fine Move (1 px)
##############################################

bind = SUPER CTRL, left, moveactive, -1 0
bind = SUPER CTRL, right, moveactive, 1 0
bind = SUPER CTRL, up, moveactive, 0 -1
bind = SUPER CTRL, down, moveactive, 0 1

##############################################
# Resize Floating Window
##############################################

bind = SUPER SHIFT, left, resizeactive, -10 0
bind = SUPER SHIFT, right, resizeactive, 10 0
bind = SUPER SHIFT, up, resizeactive, 0 -10
bind = SUPER SHIFT, down, resizeactive, 0 10


##############################################
# Multimedia Keys
##############################################

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Microphone
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media Controls
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioPause, exec, playerctl pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous

# Airplane Mode (optional)
bindl  = , XF86RFKill, exec, nmcli radio all off || nmcli radio all on

##############################################
# Screenshots
##############################################

# Print → Full screen (saved)
bind = , Print, exec, grim ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png

# Shift + Print → Select area (saved)
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png

# Ctrl + Print → Full screen to clipboard
bind = CTRL, Print, exec, grim - | wl-copy

# Ctrl + Shift + Print → Selected area to clipboard
bind = CTRL SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

##############################################
# Lock Screen
##############################################

bind = $mainMod, L, exec, pidof hyprlock || hyprlock


